<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="position-absolute top-50 start-50 translate-middle">

        <div class="text-bg-primary p-3  rounded-4 shadow  mx--5">
            
                <header>
                    <nav></nav>
                </header>
            
                <main class="justify-middle top-50 position-absolute-y">
                    <h2 class="text-center mb-3"id="titulo">Login</h2>
                    <form class="container-xxl" id="form-login">
                    <div class="form-floating">
              <input type="email" class="form-control shadow p-3 mb-5 bg-body-tertiary rounded" id="email" placeholder="name@example.com">
              <label for="email">Email</label>
            </div>
            <div class="form-floating">
              <input type="password" class="form-control shadow p-3 mb-5 bg-body-tertiary rounded" id="senha" placeholder="Password">
              <label for="senha">Senha</label>
            </div>
            <button id="botao-envio" type="submit" class="btn btn-dark vstack gap-2 col-md-5 mx-auto">Entrar</button>
            <div id="mensagem" class="text-center m-3"></div>
            <div class="toggle text-center" id="toggle">
                <p>Não tem conta cadastre-se</p>
        </div>
                    </form>
                    <a class="link-light" --bs-body-color href="https://docs.google.com/document/d/1jKLgBS5li9xooB0eBfPzwJ-DLmo604WilqItqZlrtjA/edit?usp=sharing">Esqueceu sua senha?</a>
                </main>
            
                
            </div>
            <footer>
                <p>Todos os Direitos Reservados a Daniel Tonioti e Lucas Vieira Pedroso</p>
            </footer>
        </div>

<script src="script.js"></script>
</body>
</html>
