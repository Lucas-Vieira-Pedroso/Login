<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
     <div class="position-absolute top-50 start-50 translate-middle">
         <div class="text-bg-primary p-3">       
             
                 <header>
                     <nav></nav>
                 </header>
             
                 <main>
                     <h2 id="titulo" class="text-center">Login genérico.com</h2>
                     <form class="container-xxl" id="form-login">
                     <div class="form-floating mb-3">
               <input type="email" class="form-control" id="email" placeholder="name@example.com">
               <label for="email">Email</label>
             </div>
             <div class="form-floating">
               <input type="password" class="form-control" id="senha" placeholder="Password">
               <label for="senha">Senha</label>
             </div>
             <div id="mensagem"></div>
             <div class="toggle" id="toggle">
                 <p>Não tem conta cadastre-se</p>
             </div>
     <button id="botao-envio" type="submit" class="btn btn-dark">Entrar</button>
                     </form>
                         <a class="link-light" href="https://docs.google.com/document/d/1jKLgBS5li9xooB0eBfPzwJ-DLmo604WilqItqZlrtjA/edit?usp=sharing">Esqueceu sua senha?</a>
     
     
                 </main>
             
                 <footer>
                 </footer>
     
         </div>
     </div>

<script src="script.js"></script>
</body>
</html>
